  #content { flex: 1; overflow-y: auto; padding: 24px; }

  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0;

  .card-body { padding: 20px; }

  .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer;

  .btn:active { opacity: .7; }
  .btn-primary { background: #4da6ff; color: #fff; }

  .btn-danger  { background: #dc3545; color: #fff; }
  .btn-warning { background: #fd7e14; color: #fff; }
  .btn-secondary { background: #6c757d; color: #fff; }
  .btn-dark    { background: #24303e; color: #fff; }
  .btn-outline { background: transparent; border: 1px solid #4da6ff; color: #4da6ff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; }
  .btn[disabled] { opacity: .45; cursor: not-allowed; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }

  label .req { color: #dc3545; }
  input[type=text], input[type=email], input[type=number], input[type=url],

  input:focus, select:focus, textarea:focus { outline: none; border-color: #4da6ff; }
  input[disabled], select[disabled], textarea[disabled]

  .hint { font-size: 11px; color: #f57c00; margin-top: 2px; }

  .radio-group label { display: flex; align-items: center; gap: 4px; font-weight: normal;

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; padding: 6px 0; }
  .checkbox-group label { display: flex; align-items: center; gap: 4px; font-weight: normal;

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #2c3e50; color: #fff; padding: 10px 12px; text-align: left;

  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px;

  tr:hover td { background: #fafcff; }

  .table-filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .filter-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-row-label { font-size: 13px; font-weight: 500; color: #555; min-width: 64px; }

  .table-search input { padding-right: 32px; width: 200px; }
  .pagination { display: flex; gap: 4px; align-items: center; }
  .pagination button { padding: 5px 10px; border: 1px solid #d0d5db; background: #fff;

  .page-info { font-size: 12px; color: #888; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px;

  .badge-danger   { background: #f8d7da; color: #721c24; }

  .toggle { position: relative; display: inline-block; width: 44px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc;

  .slider:before { content: ''; position: absolute; width: 16px; height: 16px;
                   left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
  input:checked + .slider { background: #28a745; }
  input:checked + .slider:before { transform: translateX(22px); }

  .accordion-item { border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 8px;

  .accordion-header { padding: 12px 16px; background: #fd7e14; color: #fff;

  .accordion-body { padding: 16px; background: #fff; }

  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

               padding: 12px; margin-top: 12px; }
  .api-block-title { font-size: 12px; font-weight: bold; color: #888;

let currentPage = 'groupList';

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setBreadcrumb(parts) {
  document.getElementById('breadcrumb').innerHTML =
    '🏠 / ' + parts.map((p, i) =>
      i < parts.length - 1 ? `<span onclick="${p.fn}">${p.label}</span>` : p.label
    ).join(' / ');
}

function setTopbar(title) {
  document.getElementById('topbar-title').textContent = title;
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + id)?.classList.add('active');
}

function pageCode(code) {
  return `<span class="page-code">頁面 <b>${code}</b></span>`;
}

function reviewBadge(status) {
  const map = {
    '未送審':   'badge-secondary',
    '待審中':   'badge-warning',
    '審核中':   'badge-orange',
    '審核通過': 'badge-success',
    '審核不通過':'badge-danger',
  };
  return `<span class="badge ${map[status] || 'badge-secondary'}">${status}</span>`;
}

function onlineBadge(status) {
  return status === '上架中'
    ? `<span class="badge badge-success">● 上架中</span>`
    : `<span class="badge badge-secondary">○ 下架中</span>`;
}

function applyTypeBadge(type) {
  const map = { '服務上架':'badge-primary', '服務下架':'badge-danger', '服務修改':'badge-warning' };
  return type ? `<span class="badge ${map[type] || 'badge-secondary'}" style="font-size:12px;">${type}</span>` : '-';
}

// ═══════════════════════════════════════════════════════
//  NAVIGATE
// ═══════════════════════════════════════════════════════
function navigate(page, params = {}) {
  currentPage = page;
  if (params.groupId !== undefined) currentGroupId = params.groupId;
  if (params.serviceId !== undefined) currentServiceId = params.serviceId;
  if (page === 'serviceList') { svcReviewFilter = '全選'; svcOnlineFilter = '全選'; }
  render();
}

function render() {
  const pages = {
    groupList:      renderGroupList,
    editGroup:      renderEditGroup,
    serviceList:    renderServiceList,
    editService:    renderEditService,
    serviceDetail:  renderServiceDetail,
    serviceMonitor: renderServiceMonitor,
    reviewList:     renderReviewList,
    reviewDetail:   renderReviewDetail,
    subsystemList:  renderSubsystemList,
    editSubsystem:  renderEditSubsystem,
  };
  (pages[currentPage] || renderGroupList)();
}

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">服務上下架管理</span>
        ${pageCode('SMB02-01')}
      </div>
      <div class="card-body">
        <div style="font-size:12px;color:#999;margin-bottom:10px;">此頁入口：〔服務上下架管理〕功能選單</div>
        <div class="table-toolbar">
          <button class="btn btn-success btn-sm" onclick="navigate('editGroup',{groupId:0})">＋ 新增資料服務群組</button>
          <div class="table-filters">
            <label>服務分類</label>
            <select onchange="filterGroups(this.value)">
              <option value="">請選擇</option>
              <option>3D Tiles</option><option>I3S</option>
              <option>WMTS</option><option>地籍圖WFS</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>服務分類</th><th>子系統</th><th>服務群組名稱</th>
              <th>服務版本</th><th>服務數量</th><th>已上架服務數量</th>
              <th>管理（管理服務群組）</th><th>資料服務（管理 API）</th>
            </tr></thead>
            <tbody id="groupTbody">${rows}</tbody>
          </table>
        </div>
        <div class="api-block">
          <div class="api-block-title">API 端點參考</div>
          <div><span class="api-method get">GET</span><code>/api/service-groups?category={category}</code> — 取得群組列表</div>
          <div><span class="api-method delete">DELETE</span><code>/api/service-groups/{id}</code> — 刪除群組</div>
          <div><span class="api-method post">POST</span><code>/api/service-groups/{id}/refresh-metadata</code> — 詮釋資料更新</div>
        </div>
      </div>
    </div>`;
}

function deleteGroup(id) {
  if (confirm('確定刪除此群組？')) {
    const idx = mockGroups.findIndex(g => g.id === id);
    if (idx > -1) mockGroups.splice(idx, 1);
    toast('群組已刪除');
    renderGroupList();
  }
}

function filterGroups(val) {
  const rows = mockGroups
    .filter(g => !val || g.category === val)
    .map(g => `
      <tr>
        <td>${g.category}</td><td>${g.subsystem}</td><td>${g.name}</td>
        <td>${g.version}</td><td>${g.total}</td><td>${g.published}</td>
        <td>
          <button class="btn btn-primary btn-xs" onclick="navigate('editGroup',{groupId:${g.id}})">✎ 編輯</button>
          <button class="btn btn-danger btn-xs" onclick="deleteGroup(${g.id})">✕ 刪除</button>
        </td>
        <td>
          <button class="btn btn-outline btn-xs" onclick="navigate('serviceList',{groupId:${g.id}})">☰ 資料服務列表</button>
          <button class="btn btn-dark btn-xs" onclick="toast('詮釋資料已更新','info')">⟳ 詮釋資料更新</button>
        </td>
      </tr>`).join('');
  document.getElementById('groupTbody').innerHTML = rows;
}

  renderServiceRows();

function renderServiceFilterBar() {
  const services = mockServices.filter(s => s.groupId === currentGroupId);
  const rc = { 全選: services.length, 未送審:0, 待審中:0, 審核中:0, 審核通過:0, 審核不通過:0 };
  const oc = { 全選: services.length, 上架中:0, 下架中:0 };
  services.forEach(s => { rc[s.reviewStatus]++; oc[s.onlineStatus]++; });

  const reviewPills = Object.keys(rc).map(k =>
    `<label class="filter-pill"><input type="radio" name="rf" value="${k}" ${svcReviewFilter===k?'checked':''} onchange="setSvcFilter('review','${k}')"> ${k} (${rc[k]})</label>`
  ).join('');
  const onlinePills = Object.keys(oc).map(k =>
    `<label class="filter-pill"><input type="radio" name="of" value="${k}" ${svcOnlineFilter===k?'checked':''} onchange="setSvcFilter('online','${k}')"> ${k} (${oc[k]})</label>`
  ).join('');

  document.getElementById('svcFilterArea').innerHTML = `
    <div class="filter-row"><span class="filter-row-label">審核狀態</span>${reviewPills}</div>
    <div class="filter-row"><span class="filter-row-label">上下架狀態</span>${onlinePills}</div>
  `;
}

function setSvcFilter(dim, val) {
  if (dim === 'review') svcReviewFilter = val; else svcOnlineFilter = val;
  renderServiceRows();
}

function svcActionCell(s) {
  if (s.reviewStatus === '待審中') {
    return `<button class="btn btn-danger btn-xs" onclick="withdrawApply(${s.id})">撤回申請</button>`;
  }
  if (s.reviewStatus === '審核中') {
    return `<span style="color:#aaa;font-size:12px;">審核中，無法操作</span>`;
  }
  const opts = s.onlineStatus === '上架中'
    ? [['修改申請','modify'], ['下架申請','offline']]
    : [['修改申請','modify'], ['上架申請','online']];
  return opts.map(([label, key]) =>
    `<label style="display:block;font-size:12px;cursor:pointer;">
      <input type="checkbox" ${s.pendingType===key?'checked':''} onchange="toggleApplyType(${s.id},'${key}','${label}')"> ${label}
    </label>`
  ).join('');
}

function renderServiceRows() {
  let services = mockServices.filter(s => s.groupId === currentGroupId);
  if (svcReviewFilter !== '全選') services = services.filter(s => s.reviewStatus === svcReviewFilter);
  if (svcOnlineFilter !== '全選') services = services.filter(s => s.onlineStatus === svcOnlineFilter);

  const rows = services.map(s => `<tr>
      <td>${s.name}</td>
      <td>
        <div class="url-cell" title="${s.internalUrl}">🔒 內部URL：${s.internalUrl}</div>
        <div class="url-cell" title="${s.externalUrl}" style="color:#1a73e8;">🌐 外部URL：${s.externalUrl||'—'}</div>
      </td>
      <td>${reviewBadge(s.reviewStatus)}</td>
      <td>${onlineBadge(s.onlineStatus)}</td>
      <td>${svcActionCell(s)}</td>
      <td>
        <button class="btn btn-primary btn-xs" onclick="navigate('editService',{serviceId:${s.id}})">✎ 編輯服務</button>
        <button class="btn btn-outline btn-xs" onclick="navigate('serviceDetail',{serviceId:${s.id}})">☰ 編輯細項</button>
        <button class="btn btn-warning btn-xs" onclick="navigate('serviceMonitor',{serviceId:${s.id}})">🖥 編輯監控</button>
      </td>
    </tr>`).join('');

  document.getElementById('svcTbody').innerHTML = rows || `<tr><td colspan="6" style="text-align:center;color:#999;">查無符合篩選條件的服務</td></tr>`;
  document.getElementById('svcPageInfo').textContent = `顯示第 1 至 ${services.length} 筆結果，共 ${services.length} 筆`;
}

function withdrawApply(id) {
  const s = mockServices.find(x => x.id === id);
  if (s) { s.reviewStatus = '未送審'; s.pendingType = null; toast('申請已撤回'); renderServiceRows(); renderServiceFilterBar(); }
}

function toggleApplyType(id, key, label) {
  const s = mockServices.find(x => x.id === id);
  if (!s) return;
  if (key === 'modify') {
    navigate('editService', { serviceId: id });
    return;
  }
  s.reviewStatus = '待審中';
  s.applyType = label;
  s.pendingType = key;
  toast(`已送出${label}，等待審核`, 'info');
  renderServiceRows();
  renderServiceFilterBar();
}

function addTag(e) {
  if (e.key === 'Enter') {
    const v = e.target.value.trim();
    if (v) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${v} <span style="cursor:pointer;" onclick="this.parentElement.remove()">✕</span>`;
      e.target.before(tag);
      e.target.value = '';
    }
    e.preventDefault();
  }
}

function toggleAccordion(header) {
  const body = header.parentElement.querySelector('.accordion-body');
  const toggle = header.querySelector('.accordion-toggle');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  toggle.textContent = isOpen ? '▼' : '▲';
  header.classList.toggle('open', !isOpen);
}

function startReview(id) {
  const s = mockServices.find(x => x.id === id);
  if (s) { s.reviewStatus = '審核中'; toast('狀態已更新為：審核中', 'info'); renderReviewList(); }
}

function passReview(id) {
  const s = mockServices.find(x => x.id === id);
  if (s) {
    s.reviewStatus = '審核通過'; s.onlineStatus = '上架中'; s.pendingType = null;
    toast('服務已審核通過，上架完成');
    renderReviewList();
  }
}

function rejectReview(id) {
  const s = mockServices.find(x => x.id === id);
  if (s) {
    const comment = prompt('請輸入退回原因：');
    s.reviewStatus = '審核不通過'; s.pendingType = null;
    if (comment) s.reviewComment = comment;
    toast('服務已退回', 'error');
    renderReviewList();
  }
}

function reviewAction(id, action) {
  const s = mockServices.find(x => x.id === id);
  const comment = document.getElementById('reviewComment')?.value || '';
  if (!s) return;
  if (s.reviewStatus !== '審核中') { toast('請先在審核列表按「開始審核」', 'error'); return; }
  if (action === 'pass') {
    s.reviewStatus = '審核通過'; s.reviewComment = comment; s.onlineStatus = '上架中'; s.pendingType = null;
    toast('審核通過，服務已上架');
  } else {
    s.reviewStatus = '審核不通過'; s.reviewComment = comment; s.pendingType = null;
    toast('服務已退回', 'error');
  }
  navigate('reviewList');
}

              <div style="display:grid;grid-template-columns:1fr 1fr 1fr 100px auto;gap:8px;margin-bottom:4px;align-items:center;">
                <input type="text" placeholder="請輸入要新增的代碼">
                <input type="text" placeholder="請輸入要新增的位置">
                <input type="text" placeholder="請輸入要新增的路徑">
                <input type="number" placeholder="port">
                <button type="button" class="btn btn-success btn-sm" onclick="toast('後端已加入','info')">＋ 加入</button>
              </div>
              <div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:5px;padding:10px;font-size:12px;margin-bottom:10px;">
                <strong>欄位對應 Kong 設定：</strong><br>
                代碼 → <code>UpStream.Name</code> &nbsp;｜&nbsp;
                位置 → <code>Target.target</code> &nbsp;｜&nbsp;
                路徑 → <code>Service.path</code>（實際用 request-transformer plugin）&nbsp;｜&nbsp;
                Port → <code>Service.Port</code>
              </div>
              ${backendRows}
            </div>
          </div>
          <div style="margin-top:20px;display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary">修改</button>
            <button type="button" class="btn btn-secondary" onclick="navigate('subsystemList')">取消</button>
          </div>
        </form>
        <div class="api-block" style="margin-top:20px;">
          <div class="api-block-title">API 端點參考</div>
          <div><span class="api-method get">GET</span><code>/api/subsystems/{id}</code> — 取得子系統詳細</div>
          <div><span class="api-method post">POST</span><code>/api/subsystems</code> — 新增子系統</div>
          <div><span class="api-method put">PUT</span><code>/api/subsystems/{id}</code> — 更新子系統</div>
        </div>
      </div>
    </div>`;
}

function saveSubsystem(e) {
  e.preventDefault();
  toast('子系統已儲存');
  navigate('subsystemList');
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
